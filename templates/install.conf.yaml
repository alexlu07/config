- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: configs/zshrc
    ~/.ackrc:
      force: true
      path: configs/ackrc
    ~/.vimrc:
      force: true
      path: configs/vimrc
    ~/.gitconfig:
      force: true
      path: configs/gitconfig
    ~/.gitignore:
      force: true
      path: configs/gitignore
    ~/.tmux.conf:
      force: true
      path: configs/tmux.conf
    # ~/.tmux/tmux_lines.sh:
    #   force: true
    #   path: configs/tmux_lines.sh
    #   create: true
    ~/.config/zellij:
      force: true
      path: configs/zellij
    ~/.config/nvim:
      force: true
      path: configs/nvim
      create: true
    ~/.config/ghostty/config:
      force: true
      path: configs/ghostty
      create: true
