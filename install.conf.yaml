- clean: ['~']

- link:
    ~/.zshrc:
      force: true
      path: zshrc
    ~/.ackrc:
      force: true
      path: ackrc
    ~/.gitconfig:
      force: true
      path: gitconfig
    ~/.gitignore:
      force: true
      path: gitignore
    ~/.tmux.conf:
      force: true
      path: tmux.conf
    ~/.tmux/tmux_lines.sh:
      force: true
      path: tmux_lines.sh
      create: true

